plugins {
}

apply plugin: 'com.android.application'

android {
    namespace 'com.mobicom.guibench'
    compileSdk 34

    signingConfigs {
        debug {
            storeFile rootProject.file('.codex-android-home/debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    defaultConfig {
        applicationId "com.mobicom.guibench"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
}
